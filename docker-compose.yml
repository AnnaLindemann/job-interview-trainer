services:
  postgres:
    image: postgres:16
    container_name: job-interview-trainer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_interview_trainer
    ports:
      - "5432:5432"
    volumes:
      - job_interview_trainer_pgdata:/var/lib/postgresql/data

volumes:
  job_interview_trainer_pgdata: